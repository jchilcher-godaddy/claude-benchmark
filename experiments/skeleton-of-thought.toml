name = "skeleton-of-thought"
description = "Test whether outlining code structure before implementing improves quality. Alternative to CoT that focuses on architecture rather than reasoning steps."

[defaults]
tasks = [
    "code-gen-01", "code-gen-02", "code-gen-03", "code-gen-04", "code-gen-05",
    "bug-fix-01", "bug-fix-02", "bug-fix-03",
    "refactor-01", "refactor-02", "refactor-03",
    "instruction-01", "instruction-02", "instruction-03",
]
models = ["haiku", "sonnet", "opus"]
profiles = ["empty"]
reps = 30

[[variants]]
label = "direct"

[[variants]]
label = "skeleton-brief"
prompt_prefix = "First, outline the function signatures and key data structures you'll need. Then implement. "

[[variants]]
label = "skeleton-typed"
prompt_prefix = "Start by writing type-annotated function signatures and class/dataclass definitions with docstrings. Then fill in each implementation. "

[[variants]]
label = "skeleton-pseudocode"
prompt_prefix = "Write 3-5 lines of pseudocode showing the high-level algorithm. Then implement in Python. "
