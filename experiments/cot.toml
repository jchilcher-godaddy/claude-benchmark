name = "chain-of-thought"
description = "Test whether explicit chain-of-thought prompting improves output quality"

[defaults]
tasks = [
    "code-gen-01", "code-gen-02", "code-gen-03",
    "bug-fix-01", "bug-fix-02", "bug-fix-03",
    "refactor-01", "refactor-02", "refactor-03",
    "instruction-01", "instruction-02", "instruction-03",
]
models = ["haiku", "sonnet", "opus"]
profiles = ["empty"]
reps = 30

[[variants]]
label = "bare"

[[variants]]
label = "cot-prefix"
prompt_prefix = "Think step by step. "

[[variants]]
label = "cot-detailed"
prompt_prefix = "Before writing any code, analyze the requirements step by step. Consider edge cases and potential issues. Then implement your solution. "
