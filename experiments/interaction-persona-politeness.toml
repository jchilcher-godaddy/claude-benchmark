name = "interaction-persona-politeness"
description = """Factorial experiment testing whether code-reviewer persona (+1.0 pts, +2.9 on refactoring) \
and polite framing (+1.5 pts) have additive, synergistic, or antagonistic interaction effects. \
2x2 design: persona x politeness. If both-combined ~ persona-only + politeness-only - neither, \
effects are additive. Use compare --cross-variant to validate 'neither' against capstone bare-default \
and 'persona-only' against persona-sweep code-reviewer."""

[defaults]
tasks = [
    "code-gen-01", "code-gen-02", "code-gen-03",
    "bug-fix-01", "bug-fix-02", "bug-fix-03",
    "refactor-01", "refactor-02", "refactor-03",
    "instruction-01", "instruction-02", "instruction-03",
]
models = ["haiku", "sonnet", "opus"]
profiles = ["empty"]
reps = 30

# --- Neither (bare baseline) ---
[[variants]]
label = "neither"
# No modifications — bare baseline for within-experiment comparison.
# Post-run: validate against capstone bare-default via compare.

# --- Persona only ---
[[variants]]
label = "persona-only"
system_prompt_extra = "You are a meticulous code reviewer. Focus on correctness, edge cases, and maintainability in every line you write."

# --- Politeness only ---
[[variants]]
label = "politeness-only"
prompt_prefix = "Could you please "

# --- Both combined ---
[[variants]]
label = "both-combined"
prompt_prefix = "Could you please "
system_prompt_extra = "You are a meticulous code reviewer. Focus on correctness, edge cases, and maintainability in every line you write."
