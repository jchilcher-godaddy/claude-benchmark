name = "claudemd-length-curve"
description = """Hypothesis: Quality peaks at 0-20 lines of instruction content, plateaus to ~100 lines, \
then measurably degrades beyond 200 lines. Maps the exact degradation curve with controlled content \
(all high-quality instructions, same style) at ~0/17/40/75/130/215 lines. Distinct from capstone \
(which compared qualitatively different profiles) and context-pollution (which used irrelevant padding). \
This uses relevant, well-written instructions at varying density."""

[defaults]
tasks = [
    "code-gen-01", "code-gen-02", "code-gen-03",
    "bug-fix-01", "bug-fix-02", "bug-fix-03",
    "refactor-01", "refactor-02", "refactor-03",
    "instruction-01", "instruction-02", "instruction-03",
]
models = ["haiku", "sonnet", "opus"]
profiles = ["empty"]
reps = 30

