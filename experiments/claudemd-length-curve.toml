- Avoid abbreviations unless universally understood (url, id, config)
- Loop variables: use descriptive names (for user in users), not single letters
- Private methods prefixed with underscore (_helper_method)
- Factory methods named create_* or from_* (User.from_dict)
- Conversion methods named to_* (user.to_json)
- Predicate methods named is_* or has_* (is_valid, has_permission)
- Context managers named with the resource they manage
- Callback parameters named on_* (on_success, on_error)

Error Handling:
- Validate all inputs at function boundaries
- Use specific exception types with actionable error messages
- Never silently swallow exceptions
- Fail fast: reject invalid state early
- Use context managers for resource cleanup (files, connections, locks)
