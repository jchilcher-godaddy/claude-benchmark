- Log errors with sufficient context before re-raising
- Custom exception hierarchy: AppError > DomainError > specific errors
- Include the failed value in the error message when validating
- Use __cause__ (raise X from Y) to preserve exception chains
- Define exception classes in a dedicated exceptions module
- Error messages should suggest what the caller can do to fix the issue
- Distinguish between user errors (ValueError) and system errors (RuntimeError)
- Use warnings.warn for deprecation notices, not print statements

Architecture:
- Keep functions focused on a single responsibility
- Prefer composition over inheritance
- Design to interfaces, not implementations
- Explicit dependency injection over global state
- Prefer readability over cleverness
- Handle edge cases explicitly
- No premature optimization
- Separate pure logic from side effects
- Use dataclasses or NamedTuples for structured data
- Avoid mutable default arguments
- Keep cyclomatic complexity below 10 per function
- Extract complex conditionals into well-named boolean variables
- Use enums instead of string constants for finite sets
- Prefer returning new objects over mutating inputs
- Layer your code: entrypoint > orchestration > business logic > data access
- Use the Strategy pattern for pluggable algorithms
- Avoid circular imports through interface segregation
- Keep modules small and focused (under 300 lines ideally)
- Use __all__ to define public API of modules
- Separate configuration from logic
- Use classmethods for alternative constructors
- Prefer slots for classes that will have many instances
- Use ABC for classes that must be subclassed

Testing Considerations:
- Write code that is easy to test (pure functions where possible)
- Keep side effects at the edges of the system
- Use dependency injection for testability
- Return values rather than modifying state in place
- Each function should have a clear contract (preconditions, postconditions)
- Document invariants that callers must maintain
- Structure code so that unit tests need no mocking for core logic
- Make illegal states unrepresentable through types
- Prefer parameterized tests for similar test cases
- Use fixtures for common test setup
- Each test should test one behavior
- Name tests descriptively: test_<function>_<scenario>_<expected>
- Arrange-Act-Assert pattern
- Mock at system boundaries only
- Test error paths, not just happy paths
- Use property-based testing for functions with clear invariants

Documentation:
- Comments explain WHY, not WHAT
- Document non-obvious design decisions
- Add TODO comments with ticket references
- Keep README up to date with architecture changes
- Document environment variables and configuration
- Inline comments for tricky algorithms only
- Module-level docstrings explaining purpose and usage
- Class docstrings with usage examples
- Document thread safety guarantees (or lack thereof)
- Note any external dependencies or system requirements
- Add type: ignore comments with justification

Performance:
- Use generators for large sequences
- Avoid unnecessary copies of large data structures
- Use appropriate data structures (set for membership, dict for lookup)
- Profile before optimizing
- Document any intentional performance tradeoffs
- Use __slots__ for classes with many instances
- Prefer itertools for complex iteration patterns
- Cache expensive computations with functools.lru_cache
- Use bisect for sorted container operations
- Avoid global state that prevents parallelization

Security:
- Never hardcode credentials or secrets
- Validate and sanitize all external inputs
